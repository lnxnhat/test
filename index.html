<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .player-container { background: #181818; padding: 25px; border-radius: 12px; width: 450px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); box-sizing: border-box; }
    h3 { margin-top: 0; color: #1db954; font-weight: 600; text-align: center; }
    .controls, .eq-container { margin-top: 20px; }
    .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    button { background: #1db954; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1ed760; scale: 1.05; }
    input[type=range] { width: 100%; accent-color: #1db954; cursor: pointer; }
    .playlist { margin-top: 20px; max-height: 160px; overflow-y: auto; background: #242424; border-radius: 6px; padding: 5px; border: 1px solid #333; }
    .playlist-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #2a2a2a; border-radius: 4px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-item:hover { background: #333; color: #fff; }
    .eq-grid { display: flex; justify-content: space-between; background: #242424; padding: 15px; border-radius: 8px; }
    .eq-band { display: flex; flex-direction: column; align-items: center; width: 60px; }
    .eq-band input[type=range] { writing-mode: vertical-lr; direction: rtl; width: 15px; height: 120px; padding: 0; }
    .eq-band span { font-size: 11px; color: #aaa; margin-top: 8px; }
    #time-display { font-variant-numeric: tabular-nums; font-size: 14px; color: #b3b3b3; }
  </style>
</head>
<body>

<div class="player-container">
  <h3 id="track-title">Đang đồng bộ dữ liệu...</h3>
  
  <audio id="audio-player" crossOrigin="anonymous"></audio>
  
  <div class="controls">
    <div class="control-row">
      <button id="btn-play">Phát</button>
      <button id="btn-pause">Tạm dừng</button>
      <span id="time-display">0:00 / 0:00</span>
    </div>
    <div>
      <input type="range" id="seek-slider" value="0" min="0" step="1">
    </div>
    <div class="control-row" style="margin-top: 15px;">
      <label style="font-size: 14px; color: #b3b3b3;">Âm lượng:</label>
      <input type="range" id="volume-slider" value="1" min="0" max="1" step="0.01" style="width: 70%;">
    </div>
  </div>

  <div class="eq-container">
    <h4 style="margin: 0 0 10px 0; font-size: 15px; color: #b3b3b3;">Bộ cân bằng âm thanh (EQ)</h4>
    <div class="eq-grid">
      <div class="eq-band"><input type="range" id="eq-60" min="-12" max="12" value="0" step="1"><span>60 Hz</span></div>
      <div class="eq-band"><input type="range" id="eq-230" min="-12" max="12" value="0" step="1"><span>230 Hz</span></div>
      <div class="eq-band"><input type="range" id="eq-910" min="-12" max="12" value="0" step="1"><span>910 Hz</span></div>
      <div class="eq-band"><input type="range" id="eq-4k" min="-12" max="12" value="0" step="1"><span>4 kHz</span></div>
      <div class="eq-band"><input type="range" id="eq-14k" min="-12" max="12" value="0" step="1"><span>14 kHz</span></div>
    </div>
  </div>

  <div class="playlist" id="playlist-container"></div>
</div>

</html>
